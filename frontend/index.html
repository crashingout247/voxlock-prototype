<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoxLock - Real-time Audio</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.js"></script>
    <script src="script.js" defer></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        #status { color: green; font-weight: bold; }
        #chat-box { border: 1px solid #ccc; height: 300px; overflow-y: scroll; padding: 10px; margin-top: 10px; }
        #message-input { width: 70%; padding: 8px; }
        button { padding: 8px 16px; }
    </style>
</head>
<body>
    <h1>VoxLock Prototype</h1>
    <p>Status: <span id="status">Connecting...</span></p>

    <div>
        <input type="text" id="message-input" placeholder="Type a test message...">
        <button id="send-btn">Send</button>
    </div>

    <div id="chat-box">
        <!-- Messages appear here -->
    </div>

    <h2>Real-time Transcription (from backend)</h2>
    <p>Start speaking – transcriptions will appear here via Socket.IO</p>
</body>
</html>
