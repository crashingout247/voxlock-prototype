<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoxLock: AI Voice Isolation</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>

    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #0d0d12; 
            color: #e0e0e0; 
            text-align: center; 
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .header-container {
            margin-bottom: 20px;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 5px;
            background: linear-gradient(90deg, #00e5ff, #b026ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        p.subtitle {
            color: #8892b0;
            font-size: 1.2rem;
            margin-top: 0;
            letter-spacing: 1px;
        }

        .video-container {
            background: #151520;
            padding: 10px;
            border-radius: 16px;
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.15), 0 0 20px rgba(176, 38, 255, 0.15);
            margin-bottom: 30px;
            position: relative;
            border: 1px solid rgba(0, 229, 255, 0.3);
        }

        #video {
            display: none;
        }

        #canvas { 
            border-radius: 12px;
            background-color: #000;
            max-width: 100%;
            display: block;
        }

        .controls {
            background: #151520;
            padding: 25px 40px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 600px;
            border: 1px solid rgba(176, 38, 255, 0.3);
        }

        button { 
            background: linear-gradient(90deg, #00e5ff, #b026ff);
            color: white; 
            padding: 15px 40px; 
            border: none; 
            border-radius: 30px; 
            cursor: pointer; 
            font-size: 1.2rem; 
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.3);
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 25px rgba(176, 38, 255, 0.6);
            background: linear-gradient(90deg, #00c4cc, #9016e6);
        }

        #status { 
            font-size: 1.1rem; 
            color: #00e5ff; 
            font-weight: 500;
            padding: 12px;
            border-radius: 8px;
            background: #0d0d12;
            border: 1px solid #00e5ff;
            text-shadow: 0 0 5px rgba(0, 229, 255, 0.5);
            letter-spacing: 0.5px;
        }

        #transcription {
            font-size: 1.4rem;
            color: #b026ff;
            margin-top: 20px;
            font-weight: bold;
            min-height: 40px;
            text-shadow: 0 0 5px rgba(176, 38, 255, 0.5);
        }
    </style>
</head>
<body>
    <div class="header-container">
        <h1>VoxLock</h1>
        <p class="subtitle">AI Voice Isolation</p>
    </div>

    <div class="video-container">
        <video id="video" width="640" height="480" autoplay playsinline></video>
        <canvas id="canvas" width="640" height="480"></canvas>
    </div>
    
    <div class="controls">
        <button id="startBtn">Initialize Core</button>
        <div id="status">Awaiting Initialization...</div>
        <div id="transcription"></div> 
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
