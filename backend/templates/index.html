<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VoxLock - Real-time Transcription</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background: #f5f5f5;
      color: #333;
    }
    h1 {
      color: #2c3e50;
    }
    #status {
      font-weight: bold;
      margin: 10px 0;
      font-size: 1.2em;
    }
    #chat-box {
      border: 1px solid #ccc;
      height: 400px;
      overflow-y: auto;
      padding: 15px;
      background: white;
      border-radius: 8px;
      margin-top: 20px;
    }
    .msg {
      margin: 10px 0;
      padding: 10px;
      border-radius: 8px;
    }
    .msg.system { background: #e8f4f8; }
    .msg.transcription { background: #d4edda; }
    .msg.error { background: #f8d7da; color: #721c24; }
  </style>
</head>
<body>
  <h1>VoxLock Prototype - Real-time Transcription</h1>
  <p id="status">Status: Connecting...</p>

  <div id="chat-box">
    <!-- Messages appear here -->
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.js"></script>
  <script src="{{ url_for('static', filename='js/script.js') }}" defer></script>
</body>
</html>
