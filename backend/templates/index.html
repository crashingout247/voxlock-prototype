<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VoxLock – Real-time Transcription</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background: #f8f9fa;
      color: #212529;
    }
    h1 {
      color: #0d6efd;
    }
    #status {
      font-weight: bold;
      font-size: 1.3em;
      margin: 15px 0;
    }
    #chat-box {
      border: 1px solid #dee2e6;
      height: 400px;
      overflow-y: auto;
      padding: 15px;
      background: white;
      border-radius: 6px;
      margin-top: 20px;
    }
    .msg {
      margin: 10px 0;
      padding: 10px 14px;
      border-radius: 8px;
      max-width: 80%;
    }
    .msg.system {
      background: #e2e3e5;
      align-self: flex-start;
    }
    .msg.transcription {
      background: #d1e7dd;
      color: #0f5132;
      align-self: flex-start;
    }
    .msg.error {
      background: #f8d7da;
      color: #842029;
    }
  </style>
</head>
<body>
  <h1>VoxLock – Real-time Transcription</h1>
  <p id="status">Status: Connecting...</p>

  <div id="chat-box">
    <!-- All messages appear here -->
  </div>

  <!-- Socket.IO CDN + your script -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.js"></script>
  <script>
  const socket = io('http://127.0.0.1:5000', { transports: ['websocket'] });
  socket.on('connect', () => console.log('Socket connected!'));
  socket.on('transcription', (data) => {
    console.log('Received transcription:', data.text);
    const chatBox = document.getElementById('chat-box');
    const msg = document.createElement('div');
    msg.className = 'msg transcription';
    msg.textContent = data.text;
    chatBox.appendChild(msg);
    chatBox.scrollTop = chatBox.scrollHeight;
  });
</script>
  <script src="{{ url_for('static', filename='js/script.js') }}?v=1" defer></script>
  <!-- ?v=1 forces reload of script.js to avoid cache -->
</body>
</html>
