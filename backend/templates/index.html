<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoxLock - Real-time Audio</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.js"></script>
    <script src="{{ url_for('static', filename='js/script.js') }}" defer></script>
    <style>
        body { font-family: Arial; margin: 20px; }
        #status { color: green; font-weight: bold; }
        #chat-box { border: 1px solid #ccc; height: 300px; overflow-y: scroll; padding: 10px; }
        .msg { margin: 10px 0; padding: 8px; border-radius: 5px; }
        .msg.server { background: #e0f7fa; }
        .msg.client { background: #c8e6c9; text-align: right; }
    </style>
</head>
<body>
    <h1>VoxLock Prototype</h1>
    <p>Status: <span id="status">Connecting...</span></p>

    <input type="text" id="msg-input" placeholder="Test message...">
    <button id="send-btn">Send</button>

    <div id="chat-box"></div>

    <h2>Real-time Transcription</h2>
    <p>Speak → transcription appears here</p>

    <script>
        // script.js content (inline for simplicity - or move to static/js/script.js)
        const socket = io();

        socket.on('connect', () => {
            document.getElementById('status').innerText = 'Connected!';
            addMsg('System', 'Connected to backend');
        });

        socket.on('message', (data) => {
            addMsg('Server', data.data);
        });

        socket.on('transcription', (data) => {
            addMsg('Transcription', data.text);
        });

        document.getElementById('send-btn').addEventListener('click', () => {
            const input = document.getElementById('msg-input');
            if (input.value) {
                socket.emit('message', input.value);
                addMsg('You', input.value);
                input.value = '';
            }
        });

        function addMsg(sender, text) {
            const box = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = 'msg ' + (sender === 'You' ? 'client' : 'server');
            div.innerHTML = `<strong>${sender}:</strong> ${text}`;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
